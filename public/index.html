<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>업무 캘린더</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
<div class="app">
  <div class="top-bar">
    <h1>업무 캘린더</h1>
    <div class="top-right">
  <span class="top-badge" id="user-name"></span>
  <button class="btn-today" onclick="goToday()">오늘</button>
  <button class="btn-today" onclick="openWidget()">위젯 열기</button>
  <button class="btn-today" onclick="hideWidget()">위젯 숨기기</button>
  <button class="btn-today" id="btn-open-widget" onclick="openWidget()">위젯 열기</button>
<button class="btn-today" id="btn-hide-widget" onclick="hideWidget()">위젯 숨기기</button>
  <button class="btn-today" onclick="copyTodayReport()">업무보고 복사</button>
  <button class="btn-today" onclick="logout()">로그아웃</button>
  <span class="top-badge" id="pending-badge">0개 남음</span>
</div>
  </div>

  <div class="layout-top">
    <div id="cal-col">
      <div class="calendar-wrap" id="calendar-wrap">
        <div class="cal-header">
          <button class="cal-nav" onclick="changeMonth(-1)">&#8249;</button>
          <h2 id="cal-title"></h2>
          <button class="cal-nav" onclick="changeMonth(1)">&#8250;</button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
    </div>

    <div class="side-panel">
      <div class="urgent-panel">
        <div class="panel-header">
          <h3>마감 임박 업무</h3>
          <span class="urgent-count" id="urgent-count">0건</span>
        </div>
        <div id="urgent-list">
          <div class="empty-urgent">임박한 업무가 없습니다</div>
        </div>
      </div>

      <div class="report-panel">
        <div class="panel-header">
          <h3>오늘의 업무현황</h3>
          <span class="report-count" id="report-summary">0 / 0</span>
        </div>
        <div id="today-report-box" class="report-box">
          <div class="empty-urgent">오늘 업무가 없습니다</div>
        </div>
      </div>

      <div class="report-panel">
        <div class="panel-header">
          <h3>보고 텍스트</h3>
        </div>
        <textarea id="report-text" class="report-textarea" readonly></textarea>
      </div>

      <div class="day-panel">
        <div class="day-panel-header">
          <h3 id="day-panel-title">날짜를 클릭하세요</h3>
          <button class="btn-add-task" id="btn-add-task" onclick="openNewDetail()" style="display:none">+ 추가</button>
        </div>
        <div class="task-list-scroll" id="day-task-list">
          <div class="empty-day">캘린더에서 날짜를 클릭하면<br>해당일 업무가 표시됩니다</div>
        </div>
      </div>
    </div>
  </div>

  <div class="detail-panel">
    <div class="detail-header" id="detail-header" style="display:none">
      <div class="detail-header-left">
        <input type="text" class="detail-title-input" id="d-title" placeholder="업무명을 입력하세요" />
      </div>
      <div class="detail-header-right">
        <span class="saved-toast" id="saved-toast" style="display:none">저장됨</span>
        <button class="btn-del2" id="btn-del2" onclick="deleteFromDetail()" style="display:none">삭제</button>
        <button class="btn-save" id="btn-save" onclick="saveDetail()" style="display:none">저장</button>
      </div>
    </div>

    <div id="detail-empty" class="detail-empty">업무를 클릭하거나 + 추가 버튼을 눌러 내용을 입력하세요</div>

    <div id="detail-body" style="display:none">
      <div class="detail-top-row">
        <div class="detail-col">
          <div class="detail-field">
            <label>기간</label>
            <div class="date-row2">
              <input type="date" id="d-start" />
              <input type="date" id="d-due" />
            </div>
          </div>
        </div>

        <div class="detail-col">
          <div class="detail-field">
            <label>카테고리 / 반복</label>
            <div class="cat-repeat-row">
              <select id="d-cat">
                <option value="">카테고리</option>
                <option value="업무">업무</option>
                <option value="기획">기획</option>
                <option value="개발">개발</option>
                <option value="미팅">미팅</option>
                <option value="개인">개인</option>
              </select>
              <select id="d-repeat">
                <option value="">반복 없음</option>
                <option value="daily">매일</option>
                <option value="weekday">평일마다</option>
                <option value="weekly">매주</option>
                <option value="monthly">매월</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <div class="detail-field">
        <label>메모</label>
        <textarea id="d-memo" placeholder="업무 관련 메모를 입력하세요..."></textarea>
      </div>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
